services:
  suno2newapi:
    build: .
    container_name: suno2newapi
    restart: unless-stopped
    environment:
      PORT: 3000
      DATA_DIR: /data
      SUNO_API_BASE_URL: ${SUNO_API_BASE_URL:-https://api.sunoapi.org}
      SUNO_API_KEY: ${SUNO_API_KEY:-}
      CALLBACK_URL: ${CALLBACK_URL:-}
      DEFAULT_MUSIC_MODEL: ${DEFAULT_MUSIC_MODEL:-V4_5ALL}
      UPSTREAM_TIMEOUT_MS: ${UPSTREAM_TIMEOUT_MS:-60000}
      MODEL_MAP_JSON: ${MODEL_MAP_JSON:-}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
